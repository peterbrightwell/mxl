name: MXL Pull Request
description: Submit a PR aligned with the MXL Definition of Done
title: "[PR] "
labels: []
assignees: []

body:

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe what this PR does and why it is needed
      placeholder: |
        What problem does this solve?
        What is the approach?
    validations:
      required: true

  - type: dropdown
    id: change_type
    attributes:
      label: Type of Change
      options:
        - Bug fix
        - Feature
        - Other
    validations:
      required: true

  - type: textarea
    id: requirement_link
    attributes:
      label: Linked Requirement (Feature only)
      description: Reference the Requirement this feature addresses (if applicable)
      placeholder: e.g. REQ-123

  - type: textarea
    id: testing_notes
    attributes:
      label: Testing Notes
      description: Describe how this was tested and validated
      placeholder: |
        Scenarios tested:
        Commands used:
        Environment:

  - type: textarea
    id: demo
    attributes:
      label: Demonstration
      description: Evidence that the change works (logs, output, screenshots, etc.)

  - type: checkboxes
    id: general_dod
    attributes:
      label: Definition of Done – General (All PRs)
      options:
        - label: PR has been peer reviewed (code review completed)
          required: true
        - label: PR has been reviewed by at least 2 TSC members
          required: true
        - label: Included in the release notes
          required: true
        - label: Has just enough documentation to understand what it does and how it should be used
          required: true
        - label: Has been seen working in a simple scenario
          required: true
        - label: Includes relevant unit / automated tests
          required: true
        - label: Backport requirement has been validated (per versioning scheme)
          required: true
        - label: PR will be merged by a Maintainer
          required: true

  - type: checkboxes
    id: feature_dod
    attributes:
      label: Definition of Done – Feature Only
      description: Complete this section only if this PR is a Feature
      options:
        - label: Feature has been reviewed by at least 2 Requirement Council members
        - label: Feature has been demonstrated or tried out
        - label: Feature is accepted as addressing the corresponding Requirement
        - label: Documentation is clear enough for users
        - label: Requirement has been closed

  - type: textarea
    id: backport_notes
    attributes:
      label: Backport Notes
      description: If backport is required, describe target versions and plan

  - type: textarea
    id: reviewer_notes
    attributes:
      label: Notes for Reviewers
      description: Anything reviewers should pay special attention to